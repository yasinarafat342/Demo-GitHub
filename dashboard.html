<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #09f; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <img src="github-logo.png" class="w-10">
            <h2 class="text-xl font-extrabold tracking-tight">GitHub Issues Tracker</h2>
        </div>
        <div class="flex items-center w-full md:w-auto gap-2">
            <input type="text" id="searchInput" placeholder="Search issues..." class="w-full md:w-80 border p-2 rounded-lg outline-none focus:border-blue-500">
            <button onclick="handleSearch()" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition">Search</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-6">
        <div class="bg-white border rounded-xl shadow-sm mb-8">
            <div class="flex border-b px-6 py-2 gap-8 text-sm font-medium text-gray-500">
                <button onclick="loadData('all')" id="btn-all" class="tab-btn py-3 transition active-tab">All</button>
                <button onclick="loadData('open')" id="btn-open" class="tab-btn py-3 transition">Open</button>
                <button onclick="loadData('closed')" id="btn-closed" class="tab-btn py-3 transition">Closed</button>
            </div>
            
            <div class="p-6 flex justify-between items-center bg-gray-50 rounded-b-xl">
                <div class="flex items-center gap-2">
                    <img src="Open-Status.png" class="w-5" id="tabIcon">
                    <span id="issueStats" class="font-bold text-gray-700 text-lg">Loading...</span>
                </div>
                <div class="flex gap-4 text-sm font-semibold">
                    <span class="text-green-600 flex items-center gap-1"><img src="Open-Status.png" class="w-4"> Open</span>
                    <span class="text-purple-600 flex items-center gap-1"><img src="Closed- Status .png" class="w-4"> Closed</span>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden flex justify-center items-center py-20">
            <div class="spinner"></div>
        </div>

        <div id="issueContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="issueModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-2xl w-full shadow-2xl transform transition-all scale-100 p-0 overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b">
                <h3 class="text-xl font-bold" id="m-title">Issue Detail</h3>
                <button onclick="closeModal()" class="text-3xl font-light hover:text-red-500 transition">&times;</button>
            </div>
            <div id="modalBody" class="p-8 space-y-6"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
