<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-xl shadow-xl w-full max-w-md text-center border border-gray-100">
        <img src="github-logo.png" alt="GitHub Logo" class="w-20 mx-auto mb-6">
        <h1 class="text-3xl font-bold text-gray-800">GitHub Issues</h1>
        <p class="text-gray-500 mb-8 mt-2">Track, manage, and collaborate on software projects.</p>
        
        <form id="loginForm" class="space-y-5 text-left">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black outline-none transition" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black outline-none transition" required>
            </div>
            <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition transform active:scale-95">Sign In</button>
        </form>

        <div class="mt-8 p-4 bg-blue-50 border border-blue-100 rounded-lg">
            <p class="text-sm text-blue-800 font-semibold mb-1">Demo Credentials:</p>
            <p class="text-xs text-blue-600">Username: <span class="font-mono">admin</span> | Password: <span class="font-mono">admin123</span></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Requirement: admin/admin123 logic
            if(user === "admin" && pass === "admin123") {
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("Invalid credentials! Use admin / admin123");
            }
        });
    </script>
</body>
</html>
